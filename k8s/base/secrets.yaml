# k8s/base/secrets.yaml
# Sura Smart - TRD Section 5: Security Requirements
# TRD 5.1.1: End-to-end Encryption
# TRD 5.1.2: Blockchain Audit Trails
# ⚠️  NOTE: These are templates. Actual secrets must be created via kubectl or secrets management

apiVersion: v1
kind: Secret
metadata:
  name: sura-smart-secrets
  namespace: sura-smart
  labels:
    app: sura-smart
    trd-compliance: "5.1"
  annotations:
    description: "Sura Smart Production Secrets (TRD 5.1)"
    rotation-policy: "quarterly"
type: Opaque
stringData:
  # TRD 2.3.3: Database Credentials
  database-url: "postgresql://sura_admin:CHANGE_ME@postgres:5432/sura_smart"
  database-password: "CHANGE_ME_USE_SECRETS_MANAGER"
  
  # TRD 2.3.3: Redis Credentials
  redis-url: "redis://:CHANGE_ME@redis:6379/0"
  redis-password: "CHANGE_ME_USE_SECRETS_MANAGER"
  
  # TRD 5.1.2: Blockchain Configuration
  blockchain-endpoint: "https://blockchain.surasmart.internal:8545"
  blockchain-private-key: "CHANGE_ME_USE_HSM"
  
  # TRD 5.1.1: Encryption Keys
  encryption-key: "CHANGE_ME_USE_KMS"
  jwt-secret: "CHANGE_ME_USE_SECRETS_MANAGER"
  audit-salt: "CHANGE_ME_USE_SECRETS_MANAGER"
  
  # TRD 7.4: Monitoring API Keys
  newrelic-license-key: "CHANGE_ME"
  datadog-api-key: "CHANGE_ME"
  datadog-app-key: "CHANGE_ME"
  
  # TRD 4.2: Authentication
  oauth-client-id: "CHANGE_ME"
  oauth-client-secret: "CHANGE_ME"
  
  # TRD 4.1: External API Keys
  government-api-key: "CHANGE_ME"
  police-db-api-key: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: sura-smart-tls
  namespace: sura-smart
  labels:
    app: sura-smart
    trd-compliance: "5.1.1"
type: kubernetes.io/tls
stringData:
  # TRD 5.1.1: TLS Certificates
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    CHANGE_ME_USE_CERT_MANAGER
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    CHANGE_ME_USE_CERT_MANAGER
    -----END PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: sura-smart-edge-encryption
  namespace: sura-smart
  labels:
    app: sura-smart
    component: edge-ai
    trd-compliance: "5.2.1"
type: Opaque
stringData:
  # TRD 5.2.1: Edge Device Encryption
  edge-encryption-key: "CHANGE_ME_USE_SECRETS_MANAGER"
  edge-device-auth-token: "CHANGE_ME"