# k8s/production/green/hpa.yaml
# Sura Smart - TRD Section 9.1: Horizontal Scaling
# TRD Section 6.1.3: 10,000 Concurrent Users

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sura-smart-green-hpa
  namespace: sura-smart
  labels:
    app: sura-smart
    version: green
    trd-compliance: "9.1"
  annotations:
    description: "Sura Smart Green Environment Auto-Scaling"
    trd-section: "9.1 - Horizontal Scaling"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sura-smart-green
  minReplicas: 5  # TRD 6.1.2: High Availability Minimum
  maxReplicas: 50  # TRD 9.1: Scale up to 5x capacity
  metrics:
    # TRD 6.1.3: CPU-based Scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # TRD 6.1.3: Memory-based Scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # TRD 6.1.1: Request-based Scaling
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: 1000
  # TRD 9.1: Scaling Behavior
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 minutes
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 10
          periodSeconds: 15
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sura-smart-green-pdb
  namespace: sura-smart
  labels:
    app: sura-smart
    version: green
    trd-compliance: "6.1.2"
spec:
  minAvailable: 3  # TRD 6.1.2: Maintain 99.95% uptime
  selector:
    matchLabels:
      app: sura-smart
      version: green