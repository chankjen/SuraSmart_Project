# k8s/production/green/deployment.yaml
# Sura Smart - TRD Section 7.3: Blue-Green Deployment
# TRD Section 6.1.2: 99.95% Availability
# TRD Section 6.1.3: 10,000 Concurrent Users

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sura-smart-green
  namespace: sura-smart
  labels:
    app: sura-smart
    version: green
    deployment-strategy: blue-green
    trd-compliance: "7.3"
  annotations:
    description: "Sura Smart Green Environment (Production)"
    last-updated: "2026-01-05"
spec:
  replicas: 5  # TRD 6.1.3: Support 10,000 concurrent users
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0  # TRD 6.1.2: Zero downtime
  selector:
    matchLabels:
      app: sura-smart
      version: green
  template:
    metadata:
      labels:
        app: sura-smart
        version: green
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # TRD 5.1.4: Security - Non-root user
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # TRD 6.1.2: High Availability - Pod Anti-Affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: sura-smart
                    version: green
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - production
      
      # TRD 5.1.4: Security - Service Account
      serviceAccountName: sura-smart-app
      automountServiceAccountToken: false
      
      containers:
        # Main Application Container
        - name: sura-smart-app
          image: ghcr.io/sura-smart/sura-smart:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 8000
              protocol: TCP
          
          # TRD 6.1.1 & 6.2.4: Performance SLAs
          env:
            - name: SEARCH_TIME_SLA
              valueFrom:
                configMapKeyRef:
                  name: sura-smart-config
                  key: SEARCH_TIME_SLA
            - name: MODEL_ACCURACY_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: sura-smart-config
                  key: MODEL_ACCURACY_THRESHOLD
            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: sura-smart-config
                  key: FLASK_ENV
          
          # TRD 5.1: Security - Secrets
          envFrom:
            - secretRef:
                name: sura-smart-secrets
          
          # TRD 6.1.2: Health Checks
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          
          # TRD 9.1: Resource Limits
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          
          # TRD 5.2.1: Volume Mounts
          volumeMounts:
            - name: model-storage
              mountPath: /app/models
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
            - name: secrets-volume
              mountPath: /app/secrets
              readOnly: true
          
          # TRD 5.1.4: Security Context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        
        # TRD 4.3.1: Edge AI Sidecar
        - name: edge-ai-sidecar
          image: ghcr.io/sura-smart/sura-smart-edge:latest
          imagePullPolicy: Always
          ports:
            - name: edge-http
              containerPort: 8001
              protocol: TCP
          env:
            - name: EDGE_MODEL_PATH
              valueFrom:
                configMapKeyRef:
                  name: sura-smart-edge-config
                  key: EDGE_MODEL_PATH
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: model-storage
              mountPath: /app/models
              readOnly: true
      
      # TRD 5.2.1: Volumes
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: sura-smart-model-pvc
        - name: tmp-volume
          emptyDir:
            medium: Memory
            sizeLimit: 500Mi
        - name: secrets-volume
          secret:
            secretName: sura-smart-secrets
            defaultMode: 0400
      
      # TRD 5.1.4: Image Pull Secrets
      imagePullSecrets:
        - name: ghcr-credentials
      
      # TRD 6.1.2: Pod Disruption Budget Reference
      terminationGracePeriodSeconds: 60
      
      # TRD 5.1.4: DNS Policy
      dnsPolicy: ClusterFirst
      
      # TRD 10.1: Restart Policy
      restartPolicy: Always